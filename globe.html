<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>India Centered Earth - Glowing in Gold</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background: #03030c;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      height: 100vh;
      width: 100vw;
    }

    #space-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    #viewer-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: grab;
      overflow: hidden;
    }

    #viewer-container:active {
      cursor: grabbing;
    }

    #earth-image {
      position: absolute;
      max-width: none;
      max-height: none;
      transform-origin: center center;
      transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
      filter: drop-shadow(0 0 30px rgba(255, 170, 0, 0.25));
    }

    /* Ambient Gold Light Ring behind Earth */
    .ambient-glow {
      position: absolute;
      width: 60vw;
      height: 60vw;
      max-width: 600px;
      max-height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 180, 0, 0.15) 0%, rgba(255, 100, 0, 0.05) 50%, transparent 70%);
      z-index: 1;
      pointer-events: none;
      transform: translate(-50%, -50%);
      top: 50%;
      left: 50%;
      animation: pulseGlow 8s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
    }

    /* Glassmorphism HUD styling */
    .hud-element {
      position: absolute;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(10, 10, 20, 0.45);
      border: 1px solid rgba(255, 215, 0, 0.15);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 215, 0, 0.05);
    }

    .header-hud {
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      padding: 15px 40px;
      border-radius: 50px;
    }

    .header-hud h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, #FFE259 0%, #FFA751 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(255, 180, 0, 0.5));
    }

    .header-hud p {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      color: rgba(255, 215, 0, 0.7);
      margin-top: 5px;
      text-transform: uppercase;
    }

    .controls-hud {
      bottom: 30px;
      left: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 215, 0, 0.2);
      color: #fff;
      padding: 10px 18px;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.1em;
    }

    .control-btn:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      transform: translateY(-2px);
    }

    .control-btn:active {
      transform: translateY(0);
    }

    .status-hud {
      bottom: 30px;
      right: 30px;
      min-width: 200px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-val {
      color: #ffd700;
      font-weight: 600;
      font-family: monospace;
    }

    /* Scroll Indicator hint */
    .scroll-hint {
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      pointer-events: none;
      opacity: 0.7;
    }

    .scroll-hint span {
      writing-mode: vertical-lr;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: rgba(255, 215, 0, 0.8);
      text-transform: uppercase;
    }

    .mouse-icon {
      width: 22px;
      height: 36px;
      border: 2px solid rgba(255, 215, 0, 0.5);
      border-radius: 12px;
      position: relative;
    }

    .mouse-wheel {
      width: 4px;
      height: 8px;
      background-color: #ffd700;
      border-radius: 2px;
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      animation: scrollWheel 1.5s ease-in-out infinite;
    }

    @keyframes scrollWheel {
      0% { top: 6px; opacity: 1; }
      100% { top: 18px; opacity: 0; }
    }

    /* Target Indicator on India */
    #india-hotspot {
      position: absolute;
      width: 40px;
      height: 40px;
      z-index: 3;
      pointer-events: none;
      transform-origin: center center;
      transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .radar-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid #ffd700;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      animation: radarPulse 2s linear infinite;
    }

    .radar-circle:nth-child(2) {
      animation-delay: 0.7s;
    }

    .radar-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background-color: #ffd700;
      border-radius: 50%;
      box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.8);
    }

    @keyframes radarPulse {
      0% { width: 0%; height: 0%; opacity: 1; }
      100% { width: 250%; height: 250%; opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Ambient background stars -->
  <canvas id="space-bg"></canvas>

  <!-- Ambient Golden Glow behind Image -->
  <div class="ambient-glow"></div>

  <!-- Zoom & Pan container -->
  <div id="viewer-container">
    <img id="earth-image" src="earth_glow.jpg" alt="Detailed Glowing Earth centered on India">
    <!-- Active Gold Radar marker directly over India in the image -->
    <div id="india-hotspot">
      <div class="radar-circle"></div>
      <div class="radar-circle"></div>
      <div class="radar-center"></div>
    </div>
  </div>

  <!-- Header HUD -->
  <div class="hud-element header-hud">
    <h1>THE GOLDEN GLOBE</h1>
    <p>Subcontinent Centered &middot; Active Zoom View</p>
  </div>

  <!-- Scroll Hint -->
  <div class="scroll-hint">
    <span>Scroll to Zoom</span>
    <div class="mouse-icon">
      <div class="mouse-wheel"></div>
    </div>
  </div>

  <!-- Controls HUD -->
  <div class="hud-element controls-hud">
    <button class="control-btn" id="zoom-in-btn">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
      ZOOM IN
    </button>
    <button class="control-btn" id="zoom-out-btn">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M4 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 8z"/></svg>
      ZOOM OUT
    </button>
    <button class="control-btn" id="reset-btn">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
      RESET VIEW
    </button>
  </div>

  <!-- Status HUD -->
  <div class="hud-element status-hud">
    <div class="status-item">
      <span>ZOOM LEVEL:</span>
      <span class="status-val" id="zoom-val">100%</span>
    </div>
    <div class="status-item">
      <span>COORDINATES:</span>
      <span class="status-val">20.59° N, 78.96° E</span>
    </div>
    <div class="status-item">
      <span>TARGET REGION:</span>
      <span class="status-val" style="color: #ffd700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.4);">INDIA</span>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------
    // Stars Generator Background Canvas
    // -------------------------------------------------------------
    const bgCanvas = document.getElementById('space-bg');
    const bgCtx = bgCanvas.getContext('2d');

    function resizeBg() {
      bgCanvas.width = window.innerWidth;
      bgCanvas.height = window.innerHeight;
      drawStars();
    }

    function drawStars() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      const starCount = 300;
      for (let i = 0; i < starCount; i++) {
        const x = Math.random() * bgCanvas.width;
        const y = Math.random() * bgCanvas.height;
        const radius = Math.random() * 1.5;
        const opacity = Math.random() * 0.8 + 0.2;
        
        bgCtx.beginPath();
        bgCtx.arc(x, y, radius, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        bgCtx.fill();
      }
    }

    window.addEventListener('resize', resizeBg);
    resizeBg();

    // -------------------------------------------------------------
    // Interactive Pan and Zoom Logic
    // -------------------------------------------------------------
    const container = document.getElementById('viewer-container');
    const earth = document.getElementById('earth-image');
    const hotspot = document.getElementById('india-hotspot');

    let zoom = 1.0;
    const minZoom = 0.5;
    const maxZoom = 4.0;
    const zoomStep = 0.15;

    // Pan state
    let isDragging = false;
    let startX, startY;
    let xOffset = 0;
    let yOffset = 0;

    // Coordinates of India relative to center of the image
    // India is nicely centered in the generated image. Let's place the hotspot at exactly the image center first.
    const hotspotOffset = { x: 0, y: -25 }; // Adjust slightly up/down if needed to sit right on central India

    function updateTransform() {
      // Apply translation and scale to the earth image
      earth.style.transform = `translate(${xOffset}px, ${yOffset}px) scale(${zoom})`;

      // Keep hotspot matching the position on the earth image
      // Hotspot moves with the offset and scales accordingly
      const hX = xOffset + (hotspotOffset.x * zoom);
      const hY = yOffset + (hotspotOffset.y * zoom);
      hotspot.style.transform = `translate(${hX}px, ${hY}px)`;

      // Update HUD
      document.getElementById('zoom-val').textContent = `${Math.round(zoom * 100)}%`;
    }

    // Initialize Earth image size and initial center
    earth.onload = () => {
      // Set to 80% of window size
      const initialSize = Math.min(window.innerWidth, window.innerHeight) * 0.8;
      earth.style.width = `${initialSize}px`;
      earth.style.height = `${initialSize}px`;
      updateTransform();
    };

    // If image is already cached
    if (earth.complete) {
      const initialSize = Math.min(window.innerWidth, window.innerHeight) * 0.8;
      earth.style.width = `${initialSize}px`;
      earth.style.height = `${initialSize}px`;
      updateTransform();
    }

    // Scroll wheel zoom
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      
      const zoomFactor = e.deltaY < 0 ? (1 + zoomStep) : (1 - zoomStep);
      let nextZoom = zoom * zoomFactor;
      nextZoom = Math.max(minZoom, Math.min(maxZoom, nextZoom));

      // Zoom towards mouse cursor coordinates
      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left - rect.width / 2;
      const mouseY = e.clientY - rect.top - rect.height / 2;

      // Adjust offset so mouse position stays constant under zoom
      xOffset = mouseX - (mouseX - xOffset) * (nextZoom / zoom);
      yOffset = mouseY - (mouseY - yOffset) * (nextZoom / zoom);

      zoom = nextZoom;
      updateTransform();
    }, { passive: false });

    // Drag / Pan interaction
    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.clientX - xOffset;
      startY = e.clientY - yOffset;
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      xOffset = e.clientX - startX;
      yOffset = e.clientY - startY;
      updateTransform();
    });

    // Touch support (mobile pan / pinch-to-zoom)
    let initialTouchDist = 0;
    let initialZoom = 1;

    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - xOffset;
        startY = e.touches[0].clientY - yOffset;
      } else if (e.touches.length === 2) {
        isDragging = false;
        initialTouchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        initialZoom = zoom;
      }
    });

    container.addEventListener('touchmove', (e) => {
      if (isDragging && e.touches.length === 1) {
        xOffset = e.touches[0].clientX - startX;
        yOffset = e.touches[0].clientY - startY;
        updateTransform();
      } else if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const factor = dist / initialTouchDist;
        zoom = Math.max(minZoom, Math.min(maxZoom, initialZoom * factor));
        updateTransform();
      }
    });

    container.addEventListener('touchend', () => {
      isDragging = false;
    });

    // Buttons
    document.getElementById('zoom-in-btn').addEventListener('click', () => {
      zoom = Math.min(maxZoom, zoom + 0.3);
      updateTransform();
    });

    document.getElementById('zoom-out-btn').addEventListener('click', () => {
      zoom = Math.max(minZoom, zoom - 0.3);
      updateTransform();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      zoom = 1.0;
      xOffset = 0;
      yOffset = 0;
      updateTransform();
    });

  </script>
</body>
</html>
